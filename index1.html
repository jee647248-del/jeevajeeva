<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Welcome to Gay Hari Hotel</title>
	<style>
		:root{
			--bg-dark:#06060a;
			--text:#ffffff;
			--accent-red:#ff2d55;
			--accent-blue:#2d9bff;
		}
		html,body{ height:100%; margin:0; }
		body{
			background: radial-gradient(1200px 600px at 10% 10%, rgba(45,155,255,0.06), transparent 12%),
									radial-gradient(1000px 500px at 90% 90%, rgba(255,45,85,0.06), transparent 12%),
									var(--bg-dark);
			color:var(--text);
			font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial;
			overflow:hidden;
			display:flex; align-items:center; justify-content:center;
		}

		/* pulsing red & blue spotlights */
		.light{ position:fixed; width:60vmax; height:60vmax; border-radius:50%; mix-blend-mode:screen; filter:blur(40px); opacity:0.55; pointer-events:none; }
		.light.red{ left:-10vmax; top:10vmax; background: radial-gradient(circle at 30% 30%, rgba(255,45,85,0.95), rgba(255,45,85,0.6) 20%, rgba(255,45,85,0.18) 40%, transparent 60%); animation: pulseRed 3.4s ease-in-out infinite; }
		.light.blue{ right:-10vmax; bottom:8vmax; background: radial-gradient(circle at 70% 70%, rgba(45,155,255,0.95), rgba(45,155,255,0.6) 20%, rgba(45,155,255,0.18) 40%, transparent 60%); animation: pulseBlue 3.8s ease-in-out infinite; }

		@keyframes pulseRed{ 0%{ transform:scale(0.92) }50%{ transform:scale(1.06) }100%{ transform:scale(0.92) } }
		@keyframes pulseBlue{ 0%{ transform:scale(1.04) }50%{ transform:scale(0.9) }100%{ transform:scale(1.04) } }

		/* central card */
		.card{ position:relative; z-index:20; text-align:center; padding:2.8rem 3.2rem; border-radius:14px; background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); box-shadow: 0 20px 80px rgba(0,0,0,0.6); backdrop-filter: blur(6px) saturate(120%); max-width:900px; width:90%; }
		h1{ margin:0; font-size:clamp(2rem,6vw,4rem); letter-spacing:1px; color:var(--text); }
		.subtitle{ margin-top:0.6rem; color:rgba(255,255,255,0.9); font-size:clamp(1rem,2.4vw,1.3rem); }

		/* hero row */
		.heroes{ margin-top:1.8rem; display:flex; gap:28px; align-items:end; justify-content:center; }
		.hero{ width:96px; height:96px; display:block; filter: drop-shadow(0 12px 30px rgba(0,0,0,0.6)); transform-origin:center; }
		.hero svg{ width:100%; height:100%; display:block; }

		/* individual floating animations */
		.h1{ animation: floatHero 5.8s ease-in-out infinite; }
		.h2{ animation: floatHero 6.9s ease-in-out infinite; animation-delay:0.4s }
		.h3{ animation: floatHero 7.6s ease-in-out infinite; animation-delay:0.9s }
		@keyframes floatHero{ 0%{ transform: translateY(0) rotate(0deg) }50%{ transform: translateY(-14px) rotate(-6deg) }100%{ transform: translateY(0) rotate(0deg) } }

		/* accents for each hero */
		.mask-1{ fill: linear-gradient; }

		/* responsive */
		@media (max-width:520px){ .hero{ width:72px; height:72px } .card{ padding:1.6rem } }
	</style>
</head>
<body>
	<!-- pulsing lights -->
	<div class="light red" aria-hidden="true"></div>
	<div class="light blue" aria-hidden="true"></div>

	<main class="card" role="main" aria-labelledby="main-title">
		<h1 id="main-title">Welcome to Gay Hari Hotel</h1>
		<div class="subtitle">An evening of red lights, blue lights, and unforgettable moments</div>

		<div class="heroes" aria-hidden="false">
			<!-- Stylized red-masked hero (inspired-by spider-like colors) -->
			<div class="hero h1" title="Red hero - stylized">
				<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
					<defs>
						<linearGradient id="rgrad" x1="0" x2="1"><stop offset="0" stop-color="#ff6b82"/><stop offset="1" stop-color="#c71d2a"/></linearGradient>
					</defs>
					<circle cx="32" cy="32" r="30" fill="url(#rgrad)" />
					<path d="M18 36c6-8 22-8 28 0c-6 10-22 10-28 0z" fill="#2b0b0b" opacity="0.9" />
					<ellipse cx="24" cy="28" rx="5" ry="8" fill="#fff" opacity="0.85" />
					<ellipse cx="40" cy="28" rx="5" ry="8" fill="#fff" opacity="0.85" />
				</svg>
			</div>

			<!-- Stylized blue-hero (inspired-by super-like colors) -->
			<div class="hero h2" title="Blue hero - stylized">
				<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
					<defs>
						<linearGradient id="bgrad" x1="0" x2="1"><stop offset="0" stop-color="#7fcaff"/><stop offset="1" stop-color="#1f73ff"/></linearGradient>
					</defs>
					<rect x="6" y="8" width="52" height="48" rx="10" fill="url(#bgrad)" />
					<polygon points="32,14 36,28 50,28 38,34 42,46 32,38 22,46 26,34 14,28 28,28" fill="#ffd966" opacity="0.95"/>
				</svg>
			</div>

			<!-- Dark hero (inspired-by bat-like colors) -->
			<div class="hero h3" title="Dark hero - stylized">
				<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
					<circle cx="32" cy="32" r="30" fill="#0a0a0f" />
					<path d="M14 36c8-10 22-12 36-2c-6-2-18 0-24 6s-8 2-12-4z" fill="#111" opacity="0.9" />
					<rect x="20" y="18" width="24" height="8" rx="4" fill="#222" />
				</svg>
			</div>
		</div>
	</main>

	<script>
		// Small accessibility guard: reduce motion preference
		if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
			document.querySelectorAll('.h1,.h2,.h3,.light').forEach(el => el.style.animation = 'none');
		}

		// optional: click on hero to show a brief caption — non-branded playful text
		document.querySelectorAll('.hero').forEach((el,i)=>{
			el.addEventListener('click', ()=>{
				const captions = ['Red guardian','Sky defender','Night sentinel'];
				const prev = document.querySelector('.caption');
				if(prev) prev.remove();
				const c = document.createElement('div');
				c.className = 'caption';
				c.textContent = captions[i] || 'Hero';
				c.style.position='absolute'; c.style.bottom='-2.4rem'; c.style.left='50%'; c.style.transform='translateX(-50%)'; c.style.padding='6px 10px'; c.style.borderRadius='8px'; c.style.background='rgba(0,0,0,0.6)'; c.style.color='#fff'; c.style.fontSize='13px';
				el.appendChild(c);
				setTimeout(()=>c.remove(),1600);
			});
		});
	</script>
</body>
</html>
